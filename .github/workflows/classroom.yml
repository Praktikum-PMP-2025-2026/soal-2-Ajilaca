name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_1"
          expected-output: |-
            DITERIMA
            garam 8
            gula 5
            DITOLAK
            beras 13
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - semua diterima
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - semua diterima
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_2"
          expected-output: |-
            DITERIMA
            apel 5
            beras 4
            DITOLAK
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - semua ditolak
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - semua ditolak
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_3"
          expected-output: |-
            DITERIMA
            DITOLAK
            garam 5
            gula 3
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - batas jam
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - batas jam
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_4"
          expected-output: |-
            DITERIMA
            susu 3
            DITOLAK
            susu 3
            teh 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - campuran terurut
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - campuran terurut
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_5"
          expected-output: |-
            DITERIMA
            apel 2
            beras 3
            zaitun 1
            DITOLAK
            apel 5
            kurma 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - satu diterima
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - satu diterima
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_6"
          expected-output: |-
            DITERIMA
            kopi 7
            DITOLAK
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - satu ditolak
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - satu ditolak
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_7"
          expected-output: |-
            DITERIMA
            DITOLAK
            kopi 7
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - item sama dua kategori
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - item sama dua kategori
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_8"
          expected-output: |-
            DITERIMA
            minyak 8
            DITOLAK
            minyak 9
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - sortir alfabetis
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - sortir alfabetis
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_9"
          expected-output: |-
            DITERIMA
            alpha 2
            charlie 3
            delta 1
            DITOLAK
            alpha 1
            bravo 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - file tanpa kiriman
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - file tanpa kiriman
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "file_10"
          expected-output: |-
            DITERIMA
            DITOLAK
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
